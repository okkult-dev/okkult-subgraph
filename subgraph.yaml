specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:

  # ── OkkultVerifier ──────────────────────────────────────
  - kind: ethereum
    name: OkkultVerifier
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: OkkultVerifier
      # Update startBlock after deployment
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ComplianceProof
        - ProtocolStats
      abis:
        - name: OkkultVerifier
          file: ./abis/OkkultVerifier.json
      eventHandlers:
        - event: ProofVerified(indexed address,indexed bytes32,uint256)
          handler: handleProofVerified
      file: ./src/okkult-verifier.ts

  # ── OkkultShield ────────────────────────────────────────
  - kind: ethereum
    name: OkkultShield
    network: mainnet
    source:
      address: "0xDAB93E727B2382972C0863a7Ac22e8b80bfBbC88"
      abi: OkkultShield
      # Block when OkkultShield was deployed
      startBlock: 21000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ShieldEvent
        - UnshieldEvent
        - PrivateTransferEvent
        - ProtocolStats
      abis:
        - name: OkkultShield
          file: ./abis/OkkultShield.json
      eventHandlers:
        - event: Shielded(indexed bytes32,indexed uint256,address,uint256)
          handler: handleShielded
        - event: Unshielded(indexed bytes32,indexed address,address,uint256)
          handler: handleUnshielded
        - event: PrivateTransfer(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handlePrivateTransfer
      file: ./src/okkult-shield.ts

  # ── OkkultVote ──────────────────────────────────────────
  - kind: ethereum
    name: OkkultVote
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: OkkultVote
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Poll
        - VoteEvent
        - ProtocolStats
      abis:
        - name: OkkultVote
          file: ./abis/OkkultVote.json
      eventHandlers:
        - event: PollCreated(indexed uint256,string,bytes32,uint256,uint256)
          handler: handlePollCreated
        - event: VoteCast(indexed uint256,indexed bytes32,bytes32)
          handler: handleVoteCast
        - event: PollTallied(indexed uint256,uint256,uint256,uint256)
          handler: handlePollTallied
      file: ./src/okkult-vote.ts
